{% extends "base.html" %}
{% load i18n %}
{% block content %}
<div class="kiosk-center">
  <div class="card kiosk-card">
    <div class="card-body text-center">
      <h1 class="h4 mb-3">{% trans "Thank you" %}</h1>
      <p class="text-muted">{% trans "You can close this window now." %}</p>
      <button id="closeBtn" class="btn btn-success btn-rect btn-block">{% trans "Close" %}</button>
      <div class="mt-3">
        <a href="{% url 'kiosk:start' %}" class="btn btn-link">{% trans "Back to start" %}</a>
      </div>
    </div>
  </div>
</div>

<script>
  (function(){
    function tryClose() {
      // różne triki zamknięcia – działa w trybie kiosk/otwarte przez skrypt
      window.close();
      window.open('', '_self'); window.close();
    }
    document.getElementById('closeBtn')?.addEventListener('click', tryClose);
    // auto-zamknięcie po 2s w trybie kiosk (jeśli dozwolone)
    setTimeout(tryClose, 2000);
    // fallback: po 3s wróć na start (gdy przeglądarka zablokowała zamknięcie)
    setTimeout(() => { window.location.href = "{% url 'kiosk:start' %}"; }, 3000);
  })();
</script>
{% endblock %}
